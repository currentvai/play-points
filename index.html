<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play Points</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Google Sans, Arial, sans-serif;
    }

    body {
      background: #f1f3f4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #202124;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }

    .google-logo {
      font-size: 52px;
      font-weight: 500;
      letter-spacing: -2px;
      margin-bottom: 35px;
    }

    .google-logo span:nth-child(1) { color: #4285F4; }
    .google-logo span:nth-child(2) { color: #EA4335; }
    .google-logo span:nth-child(3) { color: #FBBC05; }
    .google-logo span:nth-child(4) { color: #4285F4; }
    .google-logo span:nth-child(5) { color: #34A853; }
    .google-logo span:nth-child(6) { color: #EA4335; }

    .logo-box {
      margin-bottom: 28px;
    }

    .play-logo {
      width: 150px;
      border-radius: 20px;
    }

    h1 {
      font-size: 40px;
      font-weight: 500;
      margin-bottom: 28px;
      color: #202124;
    }

    .message-box {
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 12px;
      padding: 28px;
      font-size: 22px;
      line-height: 1.7;
      color: #3c4043;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }

    footer {
      margin-top: 45px;
      color: #5f6368;
      font-size: 15px;
    }

    @media (max-width: 600px) {
      .google-logo {
        font-size: 42px;
      }

      h1 {
        font-size: 32px;
      }

      .message-box {
        font-size: 18px;
        padding: 22px;
      }

      .play-logo {
        width: 120px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="google-logo">
      <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
    </div>

    <div class="logo-box">
      <img
        class="play-logo"
        src="https://www.gstatic.com/marketing-cms/assets/images/a1/55/46c0594545b78ea98bfd518de5e5/google-play-points-4-png.webp"
        alt="Play Points Logo"
      >
    </div>

    <h1>Google Play Points</h1>

    <div class="message-box">
      এই মুহূর্তে গুগল প্লে পয়েন্টস অ্যাক্টিভ করা যাবে না।<br>
      পরবর্তী নির্দেশনা এই পেজে জানিয়ে দেওয়া হবে।
    </div>

    <footer>
      © 2026 Google LLC
    </footer>

  </div>

</body>
</html>
